# =============================================================================
# 도우다 — 상하수도 요금 감면
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: water-bill-discount
name: 상하수도 요금 감면
agency: 지방자치단체 (시·군·구)
category: 생활비절감
summary: |
  기초수급자나 차상위계층이시면 수도 요금을 매달 감면받으실 수
  있어요. 지역마다 다르지만 보통 매달 1만 원 이상 절약돼요.
  많은 분이 모르고 그냥 내고 계셔요.

eligibility:
  citizenship: KR
  median_income_pct: 50

benefit:
  type: discount
  amount_krw_max:
    single: 10000
    couple: 10000

documents:
  - 신분증
  - 기초수급자 또는 차상위계층 증명서
  - 수도요금 고지서 (수용가번호 확인용)

apply:
  offline:
    - 주소지 관할 행정복지센터(주민센터)
    - 해당 지자체 상수도사업소

sources:
  - https://www.bokjiro.go.kr

last_verified: 2024-01-01

notes: |
  - 기초수급자: 매월 기본요금 면제 + 사용요금 감면 (지역별 다름).
  - 차상위계층: 기본요금 면제 또는 50% 감면 (지역별 다름).
  - 서울: 상수도 기본요금 면제 + 하수도 기본요금 면제.
  - 신청하지 않으면 자동 감면이 안 되니 주민센터에 꼭 신청하세요.
  - 3인 이상 가구는 감면 폭이 더 커질 수 있어요.

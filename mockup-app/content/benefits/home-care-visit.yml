# =============================================================================
# 도우다 — 가사간병 방문지원사업
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: home-care-visit
name: 가사간병 방문지원사업
agency: 보건복지부
category: 돌봄·간병
summary: |
  몸이 불편하시거나 일상생활이 어려우신 어르신께 돌봄 도우미가
  집으로 방문해요. 청소, 빨래, 식사 준비, 병원 동행 등을
  무료 또는 저렴하게 도와드려요.

eligibility:
  age_min: 65
  citizenship: KR
  median_income_pct: 75

benefit:
  type: service
  description: 가사·간병 도우미 방문 서비스 (월 24~48시간)

documents:
  - 신분증
  - 소득 증빙 서류 (건강보험료 납부확인서 등)
  - 진단서 또는 소견서 (간병 필요 시)

apply:
  online:
    name: 복지로
    url: https://www.bokjiro.go.kr
  offline:
    - 주소지 관할 행정복지센터(주민센터)
    - 가까운 재가노인지원서비스센터

sources:
  - https://www.bokjiro.go.kr

health_tags:
  - daily_life

show_condition:
  health_concerns:
    - daily_life

last_verified: 2024-01-01

notes: |
  - 기초수급자·차상위는 본인부담금 없이 무료예요.
  - 기준중위소득 75% 이하이면 소정의 본인부담금으로 이용 가능해요.
  - 서비스 내용: 청소, 세탁, 식사 준비, 외출 동행, 병원 동행 등.
  - 장기요양등급을 받지 못한 분도 신청 가능해요.
  - 도우미가 주 1~2회 방문해요.

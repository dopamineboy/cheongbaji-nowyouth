# =============================================================================
# 청바지 — 인지지원등급 (장기요양 등급외, 경증 치매)
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: cognitive-support-grade
name: 인지지원등급 (경증 치매)
agency: 보건복지부 · 국민건강보험공단
category: 돌봄
summary: |
  기억력이 조금 떨어지셨지만 일상생활은 가능하셔서 장기요양등급(1~5등급)
  못 받으신 어르신을 위한 등급이에요. 주야간보호센터 이용,
  치매 예방 프로그램, 가족 휴식 지원까지 받으실 수 있어요.

eligibility:
  age_min: 65
  citizenship: KR
  requires_medical_diagnosis: 치매

benefit:
  type: service
  amount_krw_max:
    single: 590000
    couple: 590000

documents:
  - 신분증
  - 건강보험증
  - 의사 소견서 (치매 진단)
  - 인지지원등급 신청서 (공단에서 받으실 수 있어요)

apply:
  online:
    name: 노인장기요양보험
    url: https://www.longtermcare.or.kr/
  offline:
    - 가까운 국민건강보험공단 지사
    - 치매안심센터 (보건소)

sources:
  - https://www.longtermcare.or.kr/

health_tags:
  - daily_life

last_verified: 2024-12-01

notes: |
  - 장기요양인정 신청 → 등급판정위원회 심의 → 인지지원등급 통보 순서.
  - 주야간보호센터에서 인지 활동·신체 운동·식사를 받으실 수 있어요.
  - 본인부담금은 일반 15%, 차상위·기초수급은 0~9%.
  - 치매안심센터에 등록하시면 추가로 무료 상담·약값 일부 지원 받으실 수 있어요.

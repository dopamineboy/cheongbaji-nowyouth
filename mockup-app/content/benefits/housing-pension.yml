# =============================================================================
# 청바지 — 주택연금 (Housing Pension / Reverse Mortgage)
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: housing-pension
name: 주택연금
agency: 금융위원회 · 한국주택금융공사 (HF)
category: 노후소득보장
summary: |
  소유하신 집(공시가격 12억 원 이하)을 담보로 매달 평생 연금을 받으실 수 있어요.
  살아 계신 동안 그 집에 계속 사실 수 있고, 돌아가신 뒤 배우자가 이어받습니다.
  만 55세 이상부터 신청 가능.

eligibility:
  age_min: 55
  citizenship: KR
  requires_homeowner: true

benefit:
  type: monthly_cash
  amount_krw_max:
    single: 2000000
    couple: 2000000

documents:
  - 신분증
  - 주택 등기부등본
  - 건축물대장
  - 본인 명의 통장 사본
  - 배우자가 있으시면 배우자 신분증·동의서

apply:
  online:
    name: 한국주택금융공사
    url: https://www.hf.go.kr
  offline:
    - 한국주택금융공사 지사
    - ☎ 1688-8114

sources:
  - https://www.hf.go.kr

last_verified: 2024-12-01

notes: |
  - 종신지급방식(평생), 확정기간방식(10~30년), 인출한도방식 등 선택 가능.
  - 받는 금액은 주택 가격·나이·방식에 따라 다름. 70세 3억 원 집 기준 월 약 80만 원.
  - 부부 중 한 분만 가입자여도 평생 보장.
  - 신청 후에도 그 집에 계속 살 수 있고, 임대 일부도 가능해요.

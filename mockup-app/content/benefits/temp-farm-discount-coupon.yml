# =============================================================================
# 청바지 — 농수산물 할인 쿠폰 (농할상품권) — 2026 한시 지원
# ⚠️ MVP 시연용 한시 데이터. 매년 시행 여부·금액·기간이 달라지므로 실제 신청 전
#     정부24·농수산물유통공사·복지로에서 최신 시행 정보를 확인하세요.
# =============================================================================

id: temp-farm-discount-coupon-2026
name: 농수산물 할인 쿠폰 (농할쿠폰)
agency: 농림축산식품부 · 한국농수산식품유통공사 (aT)
category: 생활비절감
summary: |
  국산 농수산물을 살 때 결제 금액의 20%를 할인해 드려요. 시장·마트·온라인몰에서
  사용 가능하며, 매주 1만원까지 자동 적용됩니다.

eligibility:
  citizenship: KR

benefit:
  type: discount
  amount_krw_max:
    single: 40000     # 월 최대 약 4만원 (주 1만원 × 4주)
    couple: 80000

documents:
  - 본인 명의 휴대전화 (간편 본인 인증)
  - 카드사 등록한 신용·체크카드 또는 농할상품권 앱

apply:
  online:
    name: 농할쿠폰 (한국농수산식품유통공사)
    url: https://www.at.or.kr
  offline:
    - 전통시장·하나로마트·온라인 농수산몰
    - 동주민센터 (디지털 어려우신 분 대리 신청)

sources:
  - https://www.at.or.kr
  - https://www.gov.kr (정부24 → "농할쿠폰" 검색)

is_temporary: true
valid_from: 2026-04-01
valid_until: 2026-12-31

universal: true
last_verified: 2026-05-20

notes: |
  • 만 18세 이상 누구나 신청 가능 (시니어도 동일하게 받으실 수 있어요).
  • 정부24 또는 농할쿠폰 앱에서 미리 등록 → 결제 시 자동 할인 적용.
  • 1인당 주간 한도 약 1만원, 월 한도 약 4만원. 실제 한도는 시행 회차마다 변동.
  • MVP 시연용 예시 데이터입니다. 실제 시행 여부는 정부24에서 "농할쿠폰" 검색 시
    당월 시행 정보가 안내됩니다.

id: temp-farm-discount-coupon-2026
name: 농축산물 할인지원 (농할쿠폰)
agency: 농림축산식품부 · 한국농수산식품유통공사 (aT)
category: 생활비절감
summary: |
  국산 신선 농축산물을 살 때 결제 금액의 일부를 정부가 지원해 20~30% 할인해
  드려요. 명절·김장철 등 가격이 오르는 시기에 집중 시행됩니다.

eligibility:
  citizenship: KR

benefit:
  type: discount
  amount_krw_max:
    # 1주 1만원 × 20% 한도 5천원 가정, 2주 행사 기준 약 1만원
    single: 10000
    couple: 20000

documents:
  - 본인 명의 휴대전화 (간편 본인 인증)
  - 등록한 신용·체크카드 또는 농할상품권 앱

apply:
  online:
    name: 농식품정보누리 (농축산물 할인지원)
    url: https://sale.foodnuri.go.kr/
  offline:
    - 전국 농할쿠폰 참여 마트·전통시장·온라인몰
    - 동주민센터 (디지털 어려우신 분 대리 신청 안내)

sources:
  - https://sale.foodnuri.go.kr/
  - https://www.mafra.go.kr/home/5286/subview.do


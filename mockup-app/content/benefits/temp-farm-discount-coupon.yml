# 공고 시점에 갱신 필요). 설맞이 회차(2026-01-29 ~ 02-16)는 이미 종료됨.
valid_from: 2026-09-01
valid_until: 2026-09-30

universal: true
last_verified: 2026-05-20

notes: |
  • 시행 기간 (2026):
    - 설맞이: 2026-01-29 ~ 02-16 (종료)
    - 추석맞이: 2026년 9월 예정 (공고 시점에 정확한 일자 안내)
  • 할인율: 일반 마트 20% (1주 1만원 한도) / 전통시장 30% (1주 2만원 한도)
  • 2026 총 예산: 1,080억원 (사업비 1,060억 + 운영비 20억)
  • 한도·할인율은 예산·농축산물 수급 상황에 따라 변경될 수 있음

# =============================================================================
# 청바지 — 어르신 국립공원·고궁·박물관 무료 입장
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: senior-park-museum-free
name: 어르신 국립공원·고궁·박물관 무료 입장
agency: 환경부 · 문화재청 · 문화체육관광부
category: 문화여가
summary: |
  만 65세 이상 어르신은 국립공원·국립박물관·국립미술관·고궁(경복궁 등)을
  무료로 입장하실 수 있어요. 매표소에서 신분증만 보여주시면 돼요.

eligibility:
  age_min: 65
  citizenship: KR

benefit:
  type: discount
  amount_krw_max:
    single: 30000
    couple: 60000

documents:
  - 신분증

apply:
  online:
    name: 문화체육관광부
    url: https://www.mcst.go.kr
  offline:
    - 각 시설 매표소 (현장 신분증 제시)

sources:
  - https://www.mcst.go.kr

last_verified: 2024-12-01

notes: |
  - 국립공원(설악산·지리산·북한산 등) 입장료 면제.
  - 4대 고궁(경복궁·창덕궁·창경궁·덕수궁) + 종묘 무료.
  - 국립중앙박물관·국립현대미술관·국립민속박물관 등 무료.
  - 일부 특별 전시는 별도 요금. 동반 가족은 일반 요금.
  - 외국 국적이라도 만 65세 이상이면 동일하게 무료(고궁·국립박물관).

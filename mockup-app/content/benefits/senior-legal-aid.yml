# =============================================================================
# 청바지 — 어르신 무료 법률 상담 (Legal Aid for Seniors)
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: senior-legal-aid
name: 어르신 무료 법률 상담
agency: 법무부 · 대한법률구조공단
category: 복지서비스
summary: |
  계약 분쟁, 보이스피싱 피해, 임대차 문제, 상속, 사기 등 법적 문제가
  생기셨을 때 변호사·법무사에게 무료로 상담받으실 수 있어요.
  소득이 낮으시면 소송비용까지 지원받으실 수 있어요.

eligibility:
  age_min: 60
  citizenship: KR

benefit:
  type: service
  amount_krw_max:
    single: 0
    couple: 0

documents:
  - 신분증
  - 사건 관련 자료 (계약서·내용증명·문자 캡처 등)

apply:
  online:
    name: 대한법률구조공단
    url: https://www.klac.or.kr
  offline:
    - 대한법률구조공단 ☎ 132 (24시간 자동 응답)
    - 가까운 공단 지부·출장소
    - 어르신 전용 법률홈닥터 (보건소 일부)

sources:
  - https://www.klac.or.kr

last_verified: 2024-12-01

notes: |
  - 전화 상담은 ☎ 132 (수신자 부담, 24시간).
  - 변호사·법무사·실무진이 직접 상담. 사건 진행 어려운 어르신은 소송 대리도 무료.
  - 기초수급자·차상위는 소송비용 무료, 일반 어르신은 일부 본인부담.
  - 보이스피싱·금융사기 피해는 즉시 ☎ 132 또는 1332(금감원)에 신고.

# =============================================================================
# 도우다 — 경로식당 무료급식
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: senior-free-meal
name: 경로식당 무료급식
agency: 보건복지부 · 지방자치단체
category: 식사·영양
summary: |
  가까운 경로식당에서 점심을 무료로 드실 수 있어요.
  혼자 사시거나 식사 준비가 어려우신 60세 이상 어르신이면
  누구나 이용하실 수 있어요.

eligibility:
  age_min: 60
  citizenship: KR

benefit:
  type: service
  description: 경로식당 무료 점심 (주 5일)

documents:
  - 신분증

apply:
  offline:
    - 가까운 경로식당 (복지관, 마을회관 등)
    - 주소지 관할 행정복지센터(주민센터)에서 위치 안내

sources:
  - https://www.bokjiro.go.kr

last_verified: 2024-01-01

notes: |
  - 별도 소득 기준 없이 60세 이상이면 이용 가능한 곳이 많아요.
  - 거동이 불편하시면 '식사 배달' 서비스도 신청할 수 있어요.
  - 경로식당 위치는 주민센터에 문의하시거나 복지로에서 검색하세요.
  - 독거노인, 기초수급자 우선 이용 가능해요.
  - 점심뿐 아니라 도시락 배달도 가능한 곳이 있어요.

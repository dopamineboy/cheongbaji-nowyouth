id: senior-lifelong-learning
name: 50+ 평생학습·신노년교실
agency: 교육부 · 지자체 평생교육진흥원
category: 문화여가
summary: |
  만 50세 이상이시면 외국어·컴퓨터·문해·취미·은퇴 후 인생설계 같은
  강좌를 무료 또는 저가로 들으실 수 있어요. 평생학습관·노인복지관·구청·도서관 등
  여러 곳에서 운영해요.

eligibility:
  age_min: 50
  citizenship: KR

benefit:
  type: service
  amount_krw_max:
    single: 0
    couple: 0

documents:
  - 신분증

apply:
  online:
    name: 국가평생학습포털 (늘배움)
    url: https://www.lifelongedu.go.kr
  offline:
    - 가까운 평생학습관
    - 노인복지관
    - 구·시청 평생교육과
    - 공공도서관

sources:
  - https://www.lifelongedu.go.kr

last_verified: 2024-12-01

notes: |
  - 서울 50플러스재단, 경기 50+, 부산 평생교육진흥원 등 지역별 운영.
  - 평균 수강료 무료~5만 원. 강좌 종류 수백 개.
  - 한글 처음 배우시는 분은 "성인 문해교육" 신청. 검정고시도 무료 지원.
  - 디지털 배움(키오스크·스마트폰)은 별도 사업으로 분리됨.

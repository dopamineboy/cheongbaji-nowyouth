# =============================================================================
# 청바지 — 국가건강검진 (어르신 일반·생애전환기·암 검진)
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: senior-health-checkup
name: 국가건강검진 (어르신)
agency: 보건복지부 · 국민건강보험공단
category: 건강·의료
summary: |
  국민건강보험 가입자라면 2년마다 무료 건강검진을 받으실 수 있어요.
  만 66세 어르신은 생애전환기 검진(인지·우울·신체기능 등)이 추가로 있고,
  위·대장·간·유방·자궁·폐 6대 암 검진도 무료예요.

eligibility:
  age_min: 40
  citizenship: KR

benefit:
  type: service
  amount_krw_max:
    single: 0
    couple: 0

documents:
  - 신분증
  - 건강검진 안내문 (공단에서 우편·문자 발송)

apply:
  online:
    name: 국민건강보험공단 — The건강보험
    url: https://www.nhis.or.kr/nhis/index.do
  offline:
    - 건강검진 지정 의료기관 (전국 병의원)
    - 보건소 (일반검진 일부)

sources:
  - https://www.nhis.or.kr/nhis/index.do

last_verified: 2024-12-01

notes: |
  - 검진 대상자에게 매년 초 안내문이 우편으로 와요. 안 받으셨으면 공단(1577-1000)에 전화하세요.
  - 만 66세에만 받는 생애전환기 검진은 인지기능·우울증·낙상위험까지 봐줘서 꼭 챙기세요.
  - 위암(만 40+, 2년) · 대장암(만 50+, 1년) · 간암(고위험군) · 유방암 · 자궁경부암 · 폐암(고위험 흡연자) 무료.

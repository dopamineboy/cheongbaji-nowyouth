# =============================================================================
# 청바지 — 어르신 지하철·통근전철 무임승차
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: senior-subway-free
name: 어르신 지하철 무임승차
agency: 국토교통부 · 각 도시철도공사
category: 교통
summary: |
  만 65세 이상 어르신은 전국 지하철과 통근전철을 무료로 이용하실 수 있어요.
  신분증만 보여주시면 무임승차권을 받으시거나, 어르신 교통카드를 받으셔서
  편하게 이용하실 수 있어요.

eligibility:
  age_min: 65
  citizenship: KR

benefit:
  type: discount
  amount_krw_max:
    single: 80000
    couple: 160000

documents:
  - 신분증

apply:
  online:
    name: 정부24
    url: https://www.gov.kr
  offline:
    - 지하철 역사 매표소 (1회용 무임승차권)
    - 주소지 행정복지센터 (어르신 교통카드 신청)
    - 일부 도시는 우체국·은행에서도 교통카드 발급

sources:
  - https://www.gov.kr

last_verified: 2024-12-01

notes: |
  - 서울·부산·대구·인천·광주·대전 등 도시철도와 코레일 통근형 전철 모두 무료.
  - KTX·SRT·새마을·무궁화는 별도 (KTX는 30% 할인 적용).
  - 우대용 교통카드를 받으시면 매번 매표소 안 가도 돼서 편해요.

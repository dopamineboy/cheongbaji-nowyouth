# =============================================================================
# 청바지 — 어르신 디지털 배움터 (스마트폰·키오스크·인터넷 교육)
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: senior-digital-learning
name: 어르신 디지털 배움터
agency: 과학기술정보통신부 · NIA 한국지능정보사회진흥원
category: 문화여가
summary: |
  스마트폰 사용, 카카오톡, 카메라, 사진 전송, 키오스크 주문, 모바일 뱅킹,
  병원 예약 같은 디지털 생활을 어르신께 천천히 가르쳐 드려요.
  주민센터·도서관·복지관에서 무료로 운영해요.

eligibility:
  age_min: 50
  citizenship: KR

benefit:
  type: service
  amount_krw_max:
    single: 0
    couple: 0

documents:
  - 신분증
  - 본인 스마트폰 (있으시면 가져오세요. 없으면 빌려드려요)

apply:
  online:
    name: 디지털배움터
    url: https://www.디지털배움터.kr
  offline:
    - 주소지 행정복지센터(주민센터)
    - 공공도서관
    - 노인복지관
    - 디지털 배움터 (전국 1,000여 곳)

sources:
  - https://www.디지털배움터.kr

last_verified: 2024-12-01

notes: |
  - 1:1 또는 소수 그룹 강의. 글씨 크게, 천천히, 직접 따라 해보는 방식.
  - 주제별 1~2시간씩. 보통 4~8주 코스.
  - 키오스크 실습용 모형도 있어 식당 주문, 무인발권기 사용 연습 가능.
  - 가족 동반 환영. 손주와 함께 오시면 더 재밌어요.

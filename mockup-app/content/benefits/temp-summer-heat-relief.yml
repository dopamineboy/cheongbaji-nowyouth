# =============================================================================
# 청바지 — 여름철 폭염 한시 에너지 추가지원 — 2026 하절기
# ⚠️ MVP 시연용 한시 데이터. 매년 시행 여부·금액이 달라지므로 산업통상자원부·
#     주민센터·복지로에서 최신 정보를 확인하세요.
# =============================================================================

id: temp-summer-heat-relief-2026
name: 여름철 폭염 한시 에너지 추가지원
agency: 산업통상자원부 · 한국에너지공단
category: 주거·에너지
summary: |
  여름철 폭염으로 냉방비 부담이 큰 저소득·취약계층 가구에 에너지바우처 외에
  추가로 한시 지원금을 드려요. 전기·가스 요금에 자동 차감됩니다.

eligibility:
  citizenship: KR
  median_income_pct: 60   # 기준중위소득 60% 이하 (대략 차상위계층 수준)

benefit:
  type: one_time_cash
  amount_krw_max:
    single: 53000     # 1인 가구 53,000원
    couple: 73000

documents:
  - 신분증
  - 주민등록등본
  - 전기·가스 요금 고지서 (자동 연계 시 생략)

apply:
  online:
    name: 복지로
    url: https://www.bokjiro.go.kr
  offline:
    - 주소지 행정복지센터(주민센터)
    - 가까운 한국에너지공단 지역사무소

sources:
  - https://www.bokjiro.go.kr
  - https://www.energy.or.kr

is_temporary: true
valid_from: 2026-05-01
valid_until: 2026-09-30

last_verified: 2026-05-20

notes: |
  • 기존 에너지바우처 수급 가구는 별도 신청 없이 자동 추가지원되는 경우가 많아요.
  • 기초생활수급자·차상위계층·한부모가족 우선 대상. 단, 매년 수급 범위가
    조정되므로 주민센터에서 본인 자격 확인 권장.
  • 시니어 1인 가구는 한시 지원 + 에너지바우처(상시) + 동절기 추가지원(별도)
    까지 중복 수급 가능.
  • MVP 시연용 예시. 실제 시행 여부는 복지로 또는 동주민센터에서 확인하세요.

# =============================================================================
# 청바지 — 저소득 어르신 전기·가스 복지할인
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: utility-discount-senior
name: 저소득 어르신 전기·가스 복지할인
agency: 산업통상자원부 · 한국전력공사 · 도시가스사
category: 생활비절감
summary: |
  기초수급자·차상위·장애인이신 어르신은 전기요금과 도시가스 요금을
  매달 일정 금액 또는 비율로 할인받으실 수 있어요. 한 번 신청하시면
  매달 자동 적용돼요.

eligibility:
  age_min: 65
  citizenship: KR

show_condition:
  any_of:
    - basic_livelihood
    - near_poverty
    - has_disability

benefit:
  type: discount
  amount_krw_max:
    single: 16000
    couple: 32000

documents:
  - 신분증
  - 기초수급자·차상위 증명서 또는 장애인 등록증
  - 전기·가스 고지서 또는 고객번호

apply:
  online:
    name: 복지로
    url: https://www.bokjiro.go.kr
  offline:
    - 주소지 행정복지센터(주민센터)
    - 한국전력공사 고객센터 ☎ 123
    - 가까운 도시가스사

sources:
  - https://www.bokjiro.go.kr

last_verified: 2024-12-01

notes: |
  - 전기요금: 기초생활수급자 월 16,000원, 차상위 월 8,000원, 장애인 월 16,000원 한도 할인.
  - 도시가스: 동절기(12~3월) 최대 24,000원, 비동절기 약 12,000원 할인.
  - 한 번 신청하면 자동 적용되니, 안 받고 계셨다면 소급 환급도 가능해요.
  - 한전 고객센터(123)에 전화하셔서 "복지할인 신청"이라고 말씀하시면 빠르게 처리돼요.

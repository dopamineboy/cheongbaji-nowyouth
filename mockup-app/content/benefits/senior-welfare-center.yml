# =============================================================================
# 청바지 — 노인복지관·경로당 이용
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: senior-welfare-center
name: 노인복지관·경로당 이용
agency: 보건복지부 · 지자체
category: 문화여가
summary: |
  만 60세 이상이시면 가까운 노인복지관·경로당을 무료로 이용하실 수 있어요.
  취미 교실, 평생교육, 운동, 점심 식사, 건강 상담, 같은 또래 친구 사귀기까지
  한 곳에서 할 수 있어요.

eligibility:
  age_min: 60
  citizenship: KR

benefit:
  type: service
  amount_krw_max:
    single: 0
    couple: 0

documents:
  - 신분증 (이용 등록 시)

apply:
  online:
    name: 복지로
    url: https://www.bokjiro.go.kr
  offline:
    - 가까운 노인복지관 (시·군·구별)
    - 동네 경로당 (직접 방문)
    - 주민센터에서 안내받기

sources:
  - https://www.bokjiro.go.kr

last_verified: 2024-12-01

notes: |
  - 노인복지관: 시·군·구마다 1~3곳. 점심 저렴(2,000~3,000원), 강좌 다양.
  - 경로당: 동네마다. 차·간식 + 친구. 자율 운영.
  - 복지관 강좌(컴퓨터·외국어·노래·서예 등) 대부분 무료 또는 저가.
  - 회원 등록은 신분증 가지고 방문하시면 바로 가능해요.

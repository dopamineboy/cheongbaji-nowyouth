# 2026 실제 시행 정보 기반 갱신 (2026-05-20). 연중 상시 신청.
# =============================================================================

id: temp-energy-cashback-2026
name: 한전 주택용 에너지캐시백
agency: 한국전력공사
category: 주거·에너지
summary: |
  직전 2개년 같은 기간 평균과 비교해 전기를 3% 이상 덜 쓰시면, 절감량
  1kWh당 30원~100원을 다음 달 전기요금에서 차감해 드려요.

eligibility:
  citizenship: KR

benefit:
  type: discount
  amount_krw_max:
    # 일반 가구 월평균 절감 환급액 추정. 절감률·기간에 따라 ±크게 변동.
    single: 5000
    couple: 10000

documents:
  - 본인 명의 휴대전화 (한전:ON 회원가입)
  - 전기요금 고지서 상단의 고객번호

apply:
  online:
    name: 한전 주택용 에너지캐시백 (한전:ON)
    url: https://en-ter.co.kr/
  offline:
    - 가까운 한국전력 지사 (전화 ☎ 123)

sources:
  - https://en-ter.co.kr/
  - https://online.kepco.co.kr

is_temporary: true
valid_from: 2026-01-01
valid_until: 2026-12-31

universal: true
last_verified: 2026-05-20

notes: |
  • 신청 기간: 연중 상시 (1회 신청으로 계속 자동 적용)
  • 조건: 직전 2개년 같은 기간 평균 대비 3% 이상 절감
  • 캐시백: 1kWh당 30원~100원 (절감률·조건별 차등)
  • 환급 방식: 다음 달 전기요금에서 차감 (일부 계좌 지급 가능)
  • 신청 후 줄지 못해도 벌금·불이익 없음 (자동 0원 처리)

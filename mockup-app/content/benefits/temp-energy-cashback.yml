# =============================================================================
# 청바지 — 에너지캐시백 (전기·도시가스 절약 환급) — 2026 연중 운영
# ⚠️ MVP 시연용 데이터. 실제 신청 한도·환급률은 시행 회차마다 다르므로 한국전력·
#     도시가스 회사 공지를 확인하세요.
# =============================================================================

id: temp-energy-cashback-2026
name: 에너지캐시백 (전기·도시가스 절약 환급)
agency: 한국전력공사 · 산업통상자원부
category: 주거·에너지
summary: |
  전년 같은 달과 비교해 전기·도시가스를 덜 쓰시면, 절약하신 양의 약 30%를
  현금으로 돌려드려요. 신청만 하시면 자동으로 적용됩니다.

eligibility:
  citizenship: KR

benefit:
  type: one_time_cash
  amount_krw_max:
    single: 60000     # 연 약 6만원 (절약량에 따라 변동, 최대 30만원까지 가능)
    couple: 120000

documents:
  - 본인 명의 휴대전화
  - 한국전력 또는 도시가스 고객번호 (요금 고지서 상단 숫자)

apply:
  online:
    name: 한국전력 에너지캐시백
    url: https://en-ter.co.kr
  offline:
    - 가까운 한국전력 지사 (전화 ☎ 123)
    - 도시가스 회사 콜센터

sources:
  - https://en-ter.co.kr
  - https://www.gov.kr (정부24 → "에너지캐시백" 검색)

is_temporary: true
valid_from: 2026-01-01
valid_until: 2026-12-31

universal: true
last_verified: 2026-05-20

notes: |
  • 1회 신청으로 연중 자동 적용. 매월·반기·연간 기준으로 환급 계산.
  • 전년 동월보다 사용량이 줄면 환급, 줄지 않으면 환급액 0원 (벌금·불이익 없음).
  • 시니어 우대 별도 없으나, 1인 가구일수록 절약 비율이 커서 유리합니다.
  • MVP 시연용 예시. 실제 한도·기간은 한국전력 에너지캐시백 사이트에서 확인.

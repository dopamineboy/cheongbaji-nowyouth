# =============================================================================
# 도우다 — 주거환경개선사업 (집수리 지원)
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: housing-repair
name: 주거환경개선사업 (집수리 지원)
agency: 국토교통부 · 한국토지주택공사(LH)
category: 주거
summary: |
  집이 낡거나 불편하시면 정부에서 무료로 수리해 드려요.
  도배, 장판, 보일러, 지붕, 화장실, 싱크대 교체까지
  최대 1,241만 원까지 지원받으실 수 있어요.

eligibility:
  age_min: 0
  citizenship: KR
  median_income_pct: 46
  requires_homeowner: true

show_condition:
  # 자가 소유자만 결과에 노출 (전·월세는 결과에서 제외 — 잘못된 추천 방지)
  is_homeowner: true

benefit:
  type: one_time_cash
  amount_krw_max:
    single: 12410000
    couple: 12410000

documents:
  - 신분증
  - 등본 (주민등록등본)
  - 소득 증빙 서류
  - 집 사진 (노후 상태 확인용)

apply:
  online:
    name: 마이홈포털
    url: https://www.myhome.go.kr
  offline:
    - 주소지 관할 행정복지센터(주민센터)
    - LH 콜센터 (☎ 1600-1004)

sources:
  - https://www.myhome.go.kr

last_verified: 2024-01-01

notes: |
  - 경보수(도배·장판 등): 457만 원, 중보수(보일러·창호 등): 849만 원, 대보수(지붕·기둥 등): 1,241만 원.
  - 자가 소유자만 신청 가능해요 (전·월세는 해당 안 돼요).
  - 기초수급자·차상위 가구 우선 지원돼요.
  - 장애인·고령자 가구는 편의시설(경사로, 손잡이 등)도 추가 설치해 줘요.
  - 신청 후 현장 조사를 거쳐 지원 여부가 결정돼요.

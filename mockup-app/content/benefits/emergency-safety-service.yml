# =============================================================================
# 도우다 — 응급안전안심서비스
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: emergency-safety-service
name: 응급안전안심서비스
agency: 보건복지부 · 독거노인종합지원센터
category: 안전·돌봄
summary: |
  혼자 사시는 어르신 댁에 IoT 센서(활동감지·화재감지)를 무료로
  설치해 드려요. 위급 상황이 생기면 119와 지역 담당자에게
  자동으로 알림이 가요. 설치비·이용료 모두 무료예요.

eligibility:
  age_min: 65
  citizenship: KR
  household_type:
    - alone

benefit:
  type: service
  description: IoT 센서 설치 + 24시간 모니터링 (무료)

documents:
  - 신분증
  - 독거노인 확인서 (주민센터 발급)

apply:
  online:
    name: 독거노인종합지원센터
    url: https://www.1661-2129.or.kr
  offline:
    - 주소지 관할 행정복지센터(주민센터)
    - 독거노인종합지원센터 (☎ 1661-2129)

sources:
  - https://www.1661-2129.or.kr

## show_condition: 독거노인 대상이지만, 혼자 사는 분께 자동 노출되도록
## matcher에서 household 기반 필터 추가 전까지는 조건 없이 노출

last_verified: 2024-01-01

notes: |
  - 활동감지 센서가 일정 시간 움직임을 감지하지 못하면 자동 알림이 가요.
  - 화재감지 센서도 함께 설치돼요.
  - 게이트웨이(통신장비)도 무료로 설치해 줘요.
  - 월 이용료, 설치비 모두 무료예요.
  - 가스 차단기도 요청하시면 설치 가능해요.

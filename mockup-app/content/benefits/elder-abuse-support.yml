# =============================================================================
# 도우다 — 노인학대 예방 및 쉼터 지원
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: elder-abuse-support
name: 노인보호전문기관 (학대 예방·쉼터)
agency: 보건복지부 · 중앙노인보호전문기관
category: 안전·보호
summary: |
  학대를 받고 계시거나 위험한 상황에 놓이신 어르신을 보호하고,
  쉼터와 상담을 제공하는 기관이에요.

eligibility:
  age_min: 60
  citizenship: KR

benefit:
  type: service
  amount_krw_max:
    single: 0
    couple: 0

documents:
  - 신분증 (없어도 상담 가능)

apply:
  offline:
    - 노인학대 신고 전화 1577-1389
    - 가까운 노인보호전문기관
    - 경찰 112

sources:
  - https://noinboho.or.kr

hidden_from_results: true

last_verified: 2024-01-01

notes: |
  - 24시간 상담 가능 (1577-1389).
  - 본인뿐 아니라 주변 분이 신고하셔도 됩니다.
  - 긴급 보호가 필요하시면 쉼터에서 지내실 수 있어요.
  - 모든 상담과 보호는 무료예요.

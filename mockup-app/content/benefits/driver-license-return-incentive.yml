# =============================================================================
# 청바지 — 운전면허 자진반납 인센티브
# ⚠️ 데모용 시드 — 2024년 기준. 지자체별 차이. 오픈 전 재검수 필요.
# =============================================================================

id: driver-license-return-incentive
name: 어르신 운전면허 자진반납 인센티브
agency: 도로교통공단 · 지자체
category: 교통
summary: |
  만 65세 이상 어르신이 운전면허를 자진해서 반납하시면,
  지자체에서 10~30만 원 상당의 교통카드 또는 지역화폐를 드려요.
  반납 후에도 신분증 대신 쓰실 수 있는 운전경력증명서를 발급해 드려요.

eligibility:
  age_min: 65
  citizenship: KR

benefit:
  type: one_time_cash
  amount_krw_max:
    single: 300000
    couple: 300000

documents:
  - 운전면허증
  - 신분증
  - 본인 명의 계좌 (교통카드 충전용)

apply:
  online:
    name: 안전운전 통합민원
    url: https://www.safedriving.or.kr
  offline:
    - 경찰서 민원실 (면허 반납)
    - 운전면허시험장
    - 주소지 행정복지센터(주민센터) — 인센티브 신청

sources:
  - https://www.safedriving.or.kr

last_verified: 2024-12-01

notes: |
  - 면허 반납은 경찰서, 인센티브 신청은 주민센터로 별도 진행.
  - 지자체별 금액 차이 큼: 서울 10만 원 / 부산 10만 원 / 일부 농촌 지자체 30만 원+.
  - 반납 후 발급되는 "운전경력증명서"는 신분증 대신 쓰실 수 있어요.
  - 한 번 반납하시면 일정 기간(보통 3년) 동안 면허 재취득 어려우니 신중하게 결정하세요.

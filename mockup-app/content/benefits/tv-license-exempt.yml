# =============================================================================
# 도우다 — TV 수신료 면제
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: tv-license-exempt
name: TV 수신료 면제
agency: 한국방송공사(KBS)
category: 생활비절감
summary: |
  기초수급자, 국가유공자, 장애인 가구는 TV 수신료(월 2,500원)를
  면제받을 수 있어요. 매달 전기요금에 포함되어 나가는 금액이니
  꼭 확인해 보세요.

eligibility:
  citizenship: KR
  median_income_pct: 50

benefit:
  type: discount
  amount_krw_max:
    single: 2500
    couple: 2500

documents:
  - 신분증
  - 기초수급자 증명서 또는 장애인 등록증

apply:
  online:
    name: KBS 수신료
    url: https://office.kbs.co.kr/license
  offline:
    - 한국전력공사 고객센터 (☎ 123)
    - 주소지 관할 행정복지센터(주민센터)

sources:
  - https://office.kbs.co.kr/license

last_verified: 2024-01-01

notes: |
  - 기초생활수급자, 차상위계층, 장애인(1~6급), 국가유공자 등이 면제 대상이에요.
  - 전기요금 고지서에 '수신료' 항목으로 매달 2,500원이 부과되고 있어요.
  - 한전 고객센터(123)에 전화하시면 바로 면제 신청 가능해요.
  - 면제 대상인데 그동안 납부하셨다면 소급 환급도 가능해요.
  - 신청 안 하시면 자동 면제가 안 되니 꼭 신청하세요.

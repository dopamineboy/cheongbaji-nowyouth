# =============================================================================
# 청바지 — 농지연금 (Farmland Pension)
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: farmland-pension
name: 농지연금
agency: 농림축산식품부 · 한국농어촌공사
category: 노후소득보장
summary: |
  소유하신 농지를 담보로 매달 연금처럼 일정 금액을 받으실 수 있어요.
  돌아가신 뒤에도 배우자가 이어받을 수 있고, 농지에 계속 농사 짓거나
  임대도 가능해요. 만 60세 이상 + 영농경력 5년 이상 어르신이면 신청 가능.

eligibility:
  age_min: 60
  citizenship: KR
  requires_homeowner: true

benefit:
  type: monthly_cash
  amount_krw_max:
    single: 3000000
    couple: 3000000

documents:
  - 신분증
  - 농지원부 또는 농업경영체 등록 확인서
  - 농지 등기부등본
  - 영농경력 증명 (5년 이상)
  - 배우자가 있으시면 배우자 신분증

apply:
  online:
    name: 한국농어촌공사 농지은행
    url: https://www.fbo.or.kr
  offline:
    - 한국농어촌공사 지사
    - ☎ 1577-7770

sources:
  - https://www.fbo.or.kr

last_verified: 2024-12-01

notes: |
  - 종신정액형 (평생), 기간정액형 (5/10/15/20년), 전후후박형 등 여러 방식.
  - 매달 최대 약 300만 원까지 (담보 농지 가격에 따라 다름).
  - 부부가 다 만 60세 이상이고 농지 가격 6억 원 이하면 가능.
  - 농지에 계속 농사 지으셔도 되고, 임대료 받으셔도 됩니다.

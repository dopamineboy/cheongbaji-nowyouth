# =============================================================================
# 도우다 — 통신비 감면 (기초수급자·차상위 등)
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: telecom-discount
name: 통신비 감면
agency: 과학기술정보통신부 · 한국정보통신진흥협회
category: 생활비절감
summary: |
  기초생활수급자나 차상위계층 어르신은 휴대폰·인터넷·집전화 요금을
  매달 최대 28,600원까지 감면받으실 수 있어요.
  많은 분이 모르고 계셔서, 꼭 확인해 보세요.

eligibility:
  citizenship: KR
  median_income_pct: 50

benefit:
  type: discount
  amount_krw_max:
    single: 28600
    couple: 28600

documents:
  - 신분증
  - 기초생활수급자 또는 차상위계층 증명서

apply:
  online:
    name: 통신요금 감면 신청
    url: https://www.msit.go.kr
  offline:
    - 이동통신사 대리점 (SKT, KT, LG U+ 등)
    - 주민센터

sources:
  - https://www.msit.go.kr

last_verified: 2024-01-01

notes: |
  - 기초생활수급자: 이동전화 월 28,600원, 유선전화 시내통화 75회 면제.
  - 차상위계층: 이동전화 월 28,600원 감면.
  - 장애인(1~6급): 이동전화 월 최대 50% 감면.
  - 통신사 대리점에서 신청하시면 바로 적용돼요.
  - 여러 회선이 있으시면 한 회선만 감면 가능해요.

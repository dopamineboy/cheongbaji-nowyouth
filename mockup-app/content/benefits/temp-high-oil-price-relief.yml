# =============================================================================
# 청바지 — 고유가 피해지원금 (2026)
# 출처: 행정안전부 지방재정경제실 — mois.go.kr/frt/sub/a06/b07/highOilPriceSupport
# 2026 실제 시행 (2026-05-20 검증). 사용자가 직접 언급한 정책.
# =============================================================================

id: temp-high-oil-price-relief-2026
name: 고유가 피해지원금 (2026)
agency: 행정안전부 지방재정경제실
category: 위기지원
summary: |
  고유가로 어려움을 겪는 가구를 돕기 위해 정부가 1인당 10만~60만원을 지원해
  드려요. 70%의 국민이 대상이며, 시니어·저소득 가구일수록 더 많이 받습니다.

eligibility:
  citizenship: KR
  # 소득 하위 70% — 기초·차상위·한부모는 자동 포함
  median_income_pct: 180

benefit:
  type: one_time_cash
  amount_krw_max:
    # 1인 가구 일반 기준 (소득하위 70%). 기초·차상위는 더 큼.
    single: 250000
    couple: 350000

documents:
  - 신분증
  - (대리 신청 시) 가족관계증명서 + 위임장

apply:
  online:
    name: 카드사·지역사랑상품권 앱
    url: https://www.gov.kr
  offline:
    - 주소지 동주민센터
    - 시중 은행 영업점
    - 전담 콜센터 ☎ 1670-2626

sources:
  - https://www.mois.go.kr/frt/sub/a06/b07/highOilPriceSupport/screen.do

is_temporary: true
# 2026 시행 일정:
#  - 기초·차상위 1차: 2026-04-27 ~ 05-08 (종료)
#  - 기초·차상위 2차 + 소득하위 70%: 2026-05-18 ~ 2026-07-03 (진행 중)
valid_from: 2026-05-18
valid_until: 2026-07-03

last_verified: 2026-05-20

notes: |
  • 지원 금액 (소득·지역별 차등):
    - 기초생활수급자: 최대 60만원
    - 차상위·한부모 가정: 50만원
    - 소득하위 70%: 최대 25만원
  • 신청 방법:
    - 온라인: 카드사 앱 또는 지역사랑상품권 앱 (간편 본인 인증)
    - 오프라인: 동주민센터·시중은행 영업점 방문
    - 전화 안내: 1670-2626 (전담 콜센터, 평일 09~18시)
  • 신청 기간이 짧으니 가능한 빨리 신청하세요 (2026-07-03 마감).
  • 자세한 자격 기준·지급액은 본인 거주 지자체별 안내가 다를 수 있으니
    동주민센터에서 정확히 확인하시는 게 좋아요.

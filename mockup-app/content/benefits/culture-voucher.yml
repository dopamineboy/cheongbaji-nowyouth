# =============================================================================
# 도우다 — 문화누리카드
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: culture-voucher
name: 문화누리카드
agency: 문화체육관광부 · 한국문화예술위원회
category: 문화·여가
summary: |
  기초생활수급자나 차상위계층이시면, 영화·공연·여행·체육활동에
  쓸 수 있는 카드를 연 11만 원 받으실 수 있어요.
  손주와 영화 보시거나, 여행 가실 때 사용하시면 좋아요.

eligibility:
  citizenship: KR
  median_income_pct: 50

benefit:
  type: one_time_cash
  amount_krw_max:
    single: 110000
    couple: 110000

documents:
  - 신분증
  - 기초생활수급자 또는 차상위계층 증명서

apply:
  online:
    name: 문화누리카드
    url: https://www.mnuri.kr
  offline:
    - 주소지 관할 행정복지센터(주민센터)
    - 가까운 농협 은행

sources:
  - https://www.mnuri.kr

last_verified: 2024-01-01

notes: |
  - 매년 2월부터 신청 가능하고, 연말까지 사용하셔야 해요.
  - 영화관, 공연장, 전시관, 여행사, 체육시설 등에서 사용 가능해요.
  - 온라인 쇼핑몰(인터파크, 예스24 등)에서도 사용 가능해요.
  - 잔액은 다음 해로 이월되지 않으니 꼭 쓰세요.

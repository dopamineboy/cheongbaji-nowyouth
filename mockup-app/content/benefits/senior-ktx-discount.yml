# =============================================================================
# 청바지 — 어르신 KTX·SRT·새마을·무궁화 30% 할인
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: senior-ktx-discount
name: 어르신 KTX·SRT 30% 할인
agency: 국토교통부 · 한국철도공사(코레일) · SR
category: 교통
summary: |
  만 65세 이상 어르신은 KTX·SRT·새마을·무궁화 열차를 30% 할인받아 타실 수 있어요.
  예매 시 어르신 할인 선택만 하시면 자동 적용. 주말·공휴일은 일부 제외돼요.

eligibility:
  age_min: 65
  citizenship: KR

benefit:
  type: discount
  amount_krw_max:
    single: 50000
    couple: 100000

documents:
  - 신분증 (예매 후 탑승 시 확인)

apply:
  online:
    name: 코레일톡 / SRT 앱·웹
    url: https://www.korail.com
  offline:
    - 기차역 매표창구
    - ☎ 1544-7788 (코레일) / 1800-1472 (SRT)

sources:
  - https://www.korail.com

last_verified: 2024-12-01

notes: |
  - 예매 시 "어르신 할인" 또는 "경로 할인" 선택.
  - 토·일·공휴일과 출퇴근 시간 일부는 할인 제외.
  - 코레일 앱은 글씨 크게 보기 모드가 있어서 시니어에게 편해요.
  - 자녀가 대신 예매해 주실 때도 어르신 신분증 사진만 준비하시면 돼요.

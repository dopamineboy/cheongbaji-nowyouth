# =============================================================================
# 청바지 — 저소득 어르신 안경 지원
# ⚠️ 데모용 시드 — 2024년 기준. 지자체별 운영. 오픈 전 재검수 필요.
# =============================================================================

id: senior-glasses-support
name: 저소득 어르신 안경 지원
agency: 지자체 · 한국실명예방재단
category: 건강·의료
summary: |
  눈이 침침해 글씨가 안 보이시는데 안경 사기 부담스러우시면,
  보건소·지자체·실명예방재단을 통해 안경을 무료 또는 저가로
  받으실 수 있어요. 시력검사부터 안경 제작까지 포함돼요.

eligibility:
  age_min: 60
  citizenship: KR

show_condition:
  # 저소득 어르신 우선 (기초수급·차상위)
  any_of:
    - basic_livelihood
    - near_poverty

benefit:
  type: one_time_cash
  amount_krw_max:
    single: 100000
    couple: 100000

documents:
  - 신분증
  - 기초수급자 증명서 또는 차상위 증명서
  - 시력검사 결과 (지정 안과)

apply:
  online:
    name: 한국실명예방재단
    url: https://www.kfpb.org
  offline:
    - 주소지 보건소
    - 지정 안과·안경원
    - 한국실명예방재단 ☎ 02-718-1102

sources:
  - https://www.kfpb.org

health_tags:
  - eyes

last_verified: 2024-12-01

notes: |
  - 지자체마다 지원 한도(보통 5~15만 원)와 우선순위가 달라요.
  - 안과에서 처방 받은 후 지정 안경원에서 제작·수령.
  - 일부 지자체는 시력교정뿐 아니라 백내장·녹내장 수술비도 지원해요.

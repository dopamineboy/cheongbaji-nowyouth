notes: |
  - 누구나 무료, 비밀 보장. 본인 확인 없이도 전화 상담 가능해요.
  - 어르신 우울증은 신체 증상(잠·식욕·통증)으로 먼저 나타나는 경우가 많아요.
  - 가족이 어르신 대신 상담 요청하실 수도 있어요.

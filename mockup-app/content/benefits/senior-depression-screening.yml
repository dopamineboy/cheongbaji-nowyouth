summary: |
  외로움·잠 못 주무심·기운 없으심이 오래 가시면 우울증일 수 있어요.
  정신건강복지센터에서 무료로 검사·상담받으실 수 있고,
  필요하시면 의료기관 연계까지 도와드려요. 모두 비밀 보장돼요.


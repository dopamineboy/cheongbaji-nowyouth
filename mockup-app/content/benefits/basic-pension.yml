# =============================================================================
# 도우다 — 첫 시드 콘텐츠: 기초연금 (Basic Pension)
# -----------------------------------------------------------------------------
# 본 파일은 lib/matcher.ts 의 `Benefit` 타입 스키마를 따른다.
# 어르신께 잘못된 금액/기준액을 보여드리면 신뢰가 무너지므로
# *모든* 수치는 last_verified 일자 기준이며, 매년 1월/필요 시 재검수해야 한다.
#
# ⚠️  PLACEHOLDER 표시:
#   2026 연도 기준액·지급액은 보건복지부 고시 확정 후 사람이 직접 갱신해야 한다.
#   아래 숫자는 2024년 공식 발표값을 기준으로 한 *데모용 시드*이며,
#   실제 서비스 오픈 전에 reviewer 가 sources URL 에서 다시 확인할 것.
# =============================================================================

id: basic-pension
name: 기초연금
agency: 보건복지부 · 국민연금공단
category: 노후소득보장
summary: |
  만 65세 이상 어르신 중 소득과 재산이 일정 기준 이하이신 분께,
  매달 일정 금액을 지원해 드리는 제도예요.

eligibility:
  age_min: 65
  citizenship: KR
  # 소득인정액(원/월) 상한 — 가구 형태별
  # 출처(2024년 기준): 보건복지부, 국민연금공단 기초연금 안내
  income_recognition_max:
    single: 2130000   # 단독가구 선정기준액 (2024년)
    couple: 3408000   # 부부가구 선정기준액 (2024년)

benefit:
  type: monthly_cash
  # 매월 최대 수령액(원) — 가구 형태별
  # 출처(2024년 기준): 단독 334,810원 / 부부 535,680원 (소득역전방지 감액 전)
  amount_krw_max:
    single: 334810
    couple: 535680

documents:
  - 신분증 (주민등록증·운전면허증 등)
  - 본인 명의 통장 사본
  - 배우자가 있으시면 배우자 신분증
  - 전·월세 계약서 (해당하실 때)
  - 금융정보 등 제공 동의서 (현장에서 작성하실 수 있어요)

apply:
  online:
    name: 복지로
    url: https://www.bokjiro.go.kr
  offline:
    - 주소지 관할 행정복지센터(주민센터)
    - 가까운 국민연금공단 지사

sources:
  - https://www.bokjiro.go.kr/ssis-tbu/twataa/wlfareInfo/moveTWAT52011M.do?wlfareInfoId=WLF00000020
  - https://basicpension.mohw.go.kr

last_verified: 2024-01-01

notes: |
  - 소득인정액 = 월 소득 평가액 + 재산의 월 소득환산액 입니다.
    재산이 있으시면 단순한 월급보다 계산이 복잡해질 수 있어,
    도우다는 "받으실 가능성이 높아요" 정도만 알려드리고
    정확한 금액은 주민센터·복지로에서 다시 확인하시도록 안내합니다.
  - 부부 두 분이 모두 받으시면 각자 금액에서 20% 감액되어 합산됩니다(부부감액).
  - 공무원·사학·군인·별정우체국 연금 수급자 본인과 그 배우자는
    원칙적으로 대상이 아니에요 (예외 있음).

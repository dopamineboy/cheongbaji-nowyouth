# =============================================================================
# 청바지 — 농어촌 거주 어르신 지원 (Rural Senior Support)
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: rural-senior-support
name: 농어촌 거주 어르신 지원
agency: 농림축산식품부 · 해양수산부 · 지자체
category: 복지서비스
summary: |
  농어촌에 사시는 65세 이상 어르신에게 의료·교통·돌봄·생활비
  여러 지원이 묶음으로 있어요. 농어촌 왕진 의료, 마을 공동급식,
  교통이 불편한 마을의 무료 셔틀 등을 한 번에 챙겨드려요.

eligibility:
  age_min: 65
  citizenship: KR
  regions:
    - 강원특별자치도
    - 충청북도
    - 충청남도
    - 전북특별자치도
    - 전라남도
    - 경상북도
    - 경상남도
    - 제주특별자치도

benefit:
  type: service
  amount_krw_max:
    single: 0
    couple: 0

documents:
  - 신분증
  - 농어촌 거주 증명 (주민등록등본)

apply:
  online:
    name: 복지로
    url: https://www.bokjiro.go.kr
  offline:
    - 주소지 행정복지센터(주민·면사무소)
    - 농협 지소

sources:
  - https://www.bokjiro.go.kr

last_verified: 2024-12-01

notes: |
  - 농어촌 마을 공동급식·반찬 지원
  - 100원 택시 / 행복택시 등 교통비 보조 (지자체별)
  - 농촌 왕진 의료서비스 (찾아가는 보건소)
  - 농작업 대행 서비스 (고령농)
  - 정확한 항목은 시·군·구 농정과 또는 주민센터에 문의하세요.

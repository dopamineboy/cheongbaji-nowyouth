# =============================================================================
# 도우다 — 보청기 급여 지원
# ⚠️ 데모용 시드 — 2024년 기준. 오픈 전 재검수 필요.
# =============================================================================

id: hearing-aid-support
name: 보청기 급여 지원
agency: 국민건강보험공단
category: 건강·의료
summary: |
  청각장애 등록을 하시면 보청기 구입비를 최대 131만 원까지
  지원받으실 수 있어요. 귀가 잘 안 들리시는 분은
  먼저 이비인후과에서 청력 검사를 받아보세요.

eligibility:
  citizenship: KR

benefit:
  type: one_time_cash
  amount_krw_max:
    single: 1310000
    couple: 1310000

documents:
  - 신분증
  - 청각장애 등록증
  - 이비인후과 처방전 (보청기 처방)
  - 보청기 구입 영수증

apply:
  online:
    name: 국민건강보험공단 — 보청기 급여 안내
    url: https://www.nhis.or.kr/nhis/policy/wbhada11900m01.do
  offline:
    - 국민건강보험공단 지사
    - 이비인후과 (처방 → 구입 → 급여 신청)

sources:
  - https://www.nhis.or.kr/nhis/policy/wbhada11900m01.do

show_condition:
  has_disability: true

last_verified: 2024-01-01

notes: |
  - 청각장애 등록이 되어 있어야 신청 가능해요.
  - 아직 장애 등록이 안 되어 있으시면, 이비인후과에서 청력 검사 → 장애 진단서 발급 → 주민센터에서 장애 등록 순서로 진행하세요.
  - 기초수급자·차상위: 본인부담금 없이 전액(131만 원) 지원.
  - 일반 건강보험 가입자: 본인부담금 10% (약 13만 원만 내시면 돼요).
  - 5년마다 재지급 가능해요.
  - 19세 미만은 양쪽 귀 모두 지원 가능해요.

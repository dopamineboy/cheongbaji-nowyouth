# =============================================================================
# 청바지 — 어르신 대상포진 예방접종 지원 (Shingles Vaccine Subsidy)
# ⚠️ 데모용 시드 — 2024년 기준. 지자체별 다름. 오픈 전 재검수 필요.
# =============================================================================

id: senior-shingles-vaccine
name: 대상포진 예방접종 지원
agency: 지자체 보건소
category: 건강·의료
summary: |
  대상포진은 한 번 걸리면 통증이 길고 합병증도 무서워요.
  일부 지자체에서 만 50세 또는 65세 이상 어르신께
  대상포진 백신 일부 또는 전액 지원해 드려요.

eligibility:
  age_min: 50
  citizenship: KR

benefit:
  type: discount
  amount_krw_max:
    single: 150000
    couple: 300000

documents:
  - 신분증
  - 지자체별 신청서 (보건소에서 받으실 수 있어요)

apply:
  online:
    name: 정부24
    url: https://www.gov.kr
  offline:
    - 주소지 보건소
    - 지정 위탁의료기관

sources:
  - https://www.gov.kr

health_tags:
  - daily_life

last_verified: 2024-12-01

notes: |
  - 지자체마다 지원 대상·금액·연령이 달라요. 보건소에 문의하시면 정확히 알려드려요.
  - 보통 만 65세 이상, 기초수급자·차상위, 국가유공자 우선 지원.
  - 백신 종류: 조스타박스(생백신) 또는 싱그릭스(불활화) — 의사 상담 권장.
